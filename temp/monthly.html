<!DOCTYPE html>
<html>
<head>
    <title>Monthly Attendance</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        table {
            border-collapse: collapse;
            margin: 20px auto;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 5px;
            text-align: center;
            font-size: 12px;
        }

        th {
            background: #2196F3;
            color: white;
        }

        .present {
            background-color: #4CAF50;
            color: white;
        }

        .absent {
            background-color: #f44336;
            color: white;
        }

        button {
            padding: 10px 20px;
            margin: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>📅 Monthly Attendance</h2>

<!-- Download Button -->
<a href="/download_excel">
    <button>📥 Download Excel</button>
</a>

<table>

<tr>
    <th>Name</th>

    {% for i in range(1, 32) %}
        <th>{{ i }}</th>
    {% endfor %}

    <th>Total</th>
</tr>

{% for name, days in data.items() %}
<tr>

    <td><b>{{ name }}</b></td>

    {% set total = 0 %}

    {% for d in days %}
        {% if d == 'P' %}
            <td class="present">P</td>
            {% set total = total + 1 %}
        {% else %}
            <td class="absent">A</td>
        {% endif %}
    {% endfor %}

    <td><b>{{ total }}</b></td>

</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard">
    <button>⬅ Back to Dashboard</button>
</a>

</body>
</html>
