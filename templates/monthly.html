<!DOCTYPE html>
<html>
<head>
    <title>Monthly Attendance</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        button {
            padding: 8px 15px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 95%;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            font-size: 12px;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        .present {
            color: green;
            font-weight: bold;
        }

        .absent {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>📅 Monthly Attendance</h2>

<!-- Buttons -->
<a href="/">
    <button>⬅️ Back</button>
</a>

<a href="/download">
    <button>⬇️ Download Excel</button>
</a>

<table>

<tr>
    <th>Name</th>
    {% for d in days %}
        <th>{{ d }}</th>
    {% endfor %}
    <th>Total</th>
</tr>

{% for name, records in attendance.items() %}
<tr>
    <td>{{ name }}</td>

    {% set total = 0 %}

    {% for val in records %}
        {% if val == 'P' %}
            <td class="present">P</td>
            {% set total = total + 1 %}
        {% else %}
            <td class="absent">A</td>
        {% endif %}
    {% endfor %}

    <td>{{ total }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
